		<title>Frame0</title>
		<style type="text/css">
* {
	margin: 0px;
	padding: 0px;
	box-sizing: border-box;
}

body {
	position: absolute;
	display: block;
	width: 100%;
	height: 100%;
	overflow: hidden;
	background: radial-gradient(circle at top, rgba(0, 255, 255, 0.18), rgba(0, 0, 0, 1) 60%);
	font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body::before {
	content: "";
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: radial-gradient(circle at 30% 20%, rgba(0, 255, 255, 0.28), transparent 45%),
		linear-gradient(120deg, rgba(0, 255, 255, 0.12) 0%, transparent 40%, transparent 60%, rgba(0, 255, 255, 0.12) 100%);
	background-size: 60% 60%, 120% 120%;
	animation: bgShift 12s linear infinite;
	pointer-events: none;
	z-index: 0;
}

@keyframes bgShift {
	0% { transform: translateZ(0) scale(1); }
	50% { transform: translateZ(0) scale(1.02); }
	100% { transform: translateZ(0) scale(1); }
}

#close-btn {
	position: fixed;
	top: 16px;
	right: 16px;
	z-index: 99999;
	width: 44px;
	height: 44px;
	border: none;
	border-radius: 999px;
	background: rgba(0, 0, 0, 0.65);
	color: #00ffff;
	font-size: 22px;
	font-weight: 700;
	cursor: pointer;
	box-shadow: 0 0 18px rgba(0, 255, 255, 0.45);
}

#close-btn:hover {
	background: rgba(0, 0, 0, 0.85);
}

embed, ruffle-embed, ruffle-player {
	position: absolute;
	display: block;
	width: 100%;
	height: 100%;
	border: none;
	z-index: 1;
}

#frame {
	position: absolute;
	width: 100%;
	height: 100%;
	z-index: 1;
}

/* Hide common ad elements */
iframe[src*="doubleclick"],
iframe[src*="googlesyndication"],
iframe[src*="adservice"],
iframe[src*="adzerk"],
iframe[src*="adsystem"],
iframe[src*="ads."],
iframe[src*="advert"],
iframe[src*="googleads"],
iframe[src*="amazon-adsystem"],
iframe[src*="pubads"],
ins.adsbygoogle,
.adhesion,
.advertisement,
.ad-slot,
[class*="ad"],
[id*="ad"] {
	display: none !important;
}

	<body>
		<button id="close-btn" title="Back to games">✕</button>
		<script type="text/javascript">
"use strict";

// <![CDATA[
(() => {
	const location = new URL(window.location.href);
	const src = location.searchParams.get("src");
	if (src == null || src.length == 0) {
		console.warn("No embed source specified");
		return;
	}

	const closeBtn = document.getElementById("close-btn");
	closeBtn.onclick = () => {
		window.location.href = "/";
	};

	const removeAds = () => {
		const adSelectors = [
			"iframe[src*='doubleclick']",
			"iframe[src*='googlesyndication']",
			"iframe[src*='adservice']",
			"iframe[src*='adsystem']",
			"iframe[src*='ads.']",
			"iframe[src*='advert']",
			"iframe[src*='amazon-adsystem']",
			"iframe[src*='pubads']",
			"ins.adsbygoogle",
			".adhesion",
			".advertisement",
			".ad-slot",
			"[class*='ad']",
			"[id*='ad']"
		];

		for (const selector of adSelectors) {
			const nodes = document.querySelectorAll(selector);
			for (const node of nodes) {
				node.remove();
			}
		}
	};

	const observer = new MutationObserver(() => removeAds());
	observer.observe(document.body, { childList: true, subtree: true });

	removeAds();

	switch (location.searchParams.get("type")) {
		case "flash": {
			const ruffle = window.RufflePlayer.newest();
			const player = ruffle.createPlayer();
			document.body.appendChild(player);
			player.load(src);
			break;
		}
		case "jsdos": {
			const frame = document.createElement("div");
			frame.id = "frame";
			document.body.appendChild(frame);
			emulators.pathPrefix = "/lib/jsdos/";
			Dos(frame).run(src);
			break;
		}
		default: {
			const frame = document.createElement("embed");
			frame.type = "text/plain";
			frame.width = "1024";
			frame.height = "768";
			frame.src = src;
			document.body.appendChild(frame);
			break;
		}
	}

})();
// ]]>
		</script>
